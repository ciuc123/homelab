name: Create subdomain from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pages: write
  issues: write

jobs:
  create-subdomain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      - name: Run create subdomain script
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ZONE_NAME: ${{ secrets.CF_ZONE_NAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TEMPLATE_OWNER: ${{ secrets.TEMPLATE_OWNER }}
          TEMPLATE_REPO: ${{ secrets.TEMPLATE_REPO }}
          GH_OWNER: ${{ secrets.GH_OWNER }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_REPO: ${{ github.repository }}
        run: |
          python scripts/create_subdomain.py --issue-title "${{ github.event.issue.title }}" --issue-body "${{ github.event.issue.body }}"
